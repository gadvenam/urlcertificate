# ============================================================================
# NAMESPACE, SERVICE ACCOUNT AND RBAC CONFIGURATION
# ============================================================================
# Namespace: pre-prod-dr-gitlab
# ServiceAccount: cicd-sa
# Permissions: Cluster-Admin (full cluster access)
# ============================================================================

---
# ============================================================================
# NAMESPACE CREATION
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: pre-prod-dr-gitlab
  labels:
    environment: pre-prod-dr
    component: gitlab
    eip: pre-prod-dr-cluster
    istio-discovery: pre-prod-dr-istio
    istio.io/rev: pre-prod-dr-istio
    dynatrace.com/inject: "true"

---
# ============================================================================
# SERVICE ACCOUNT CREATION
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cicd-sa
  namespace: pre-prod-dr-gitlab
  labels:
    app: cicd
    service: gitlab-cicd
    environment: pre-prod-dr
    component: gitlab

---
# ============================================================================
# CLUSTER ROLE BINDING - CLUSTER-ADMIN RIGHTS FOR SERVICE ACCOUNT
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cicd-sa-cluster-admin
  labels:
    serviceaccount: cicd-sa
    namespace: pre-prod-dr-gitlab
    role: cluster-admin
    environment: pre-prod-dr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: cicd-sa
  namespace: pre-prod-dr-gitlab
